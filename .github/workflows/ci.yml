name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv --quiet

      - name: Run verify.sh
        run: bash scripts/verify.sh

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit hygiene — no claude.ai session URLs or Co-authored-by Claude trailers
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            RANGE="origin/main..HEAD"
          else
            # Push to main: check only the newly pushed commit(s).
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              RANGE="HEAD^..HEAD"
            else
              RANGE="$BEFORE..$SHA"
            fi
          fi
          MSGS=$(git log "$RANGE" --format='%B' 2>/dev/null || git log -1 --format='%B')
          if echo "$MSGS" | grep -qF 'claude.ai/code/session'; then
            echo "ERROR: commit message contains a claude.ai/code/session URL — remove it before merging"
            exit 1
          fi
          if echo "$MSGS" | grep -iqF 'co-authored-by: claude'; then
            echo "ERROR: commit message contains a Co-authored-by: Claude trailer — remove it before merging"
            exit 1
          fi
          echo "OK: commit hygiene verified"
          echo "RANGE=$RANGE" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check docs/paper/paper.md and docs/paper/latex/ stay in sync
        run: python3 scripts/check_paper_latex_sync.py "$RANGE"

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv --quiet

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run pip-audit
        # Non-blocking (T1 tier): findings are surfaced in logs but never fail the build.
        continue-on-error: true
        run: uv run --with pip-audit pip-audit
